<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f8eff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Title -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e8edf5" text-anchor="middle">
    CreditSense AI — System Architecture
  </text>
  
  <!-- Data Layer -->
  <rect x="50" y="80" width="200" height="120" rx="12" fill="#111827" stroke="#1f2d42" stroke-width="2" filter="url(#shadow)"/>
  <text x="150" y="110" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="url(#grad1)" text-anchor="middle">DATA LAYER</text>
  <text x="150" y="135" font-family="Arial, sans-serif" font-size="12" fill="#8899aa" text-anchor="middle">150K Loan Records</text>
  <text x="150" y="155" font-family="Arial, sans-serif" font-size="12" fill="#8899aa" text-anchor="middle">Give Me Some Credit</text>
  <text x="150" y="175" font-family="Arial, sans-serif" font-size="12" fill="#8899aa" text-anchor="middle">SQLite Predictions DB</text>
  
  <!-- Rest of SVG continues... -->
  <text x="500" y="650" font-family="Arial, sans-serif" font-size="10" fill="#8899aa" text-anchor="middle">
    Python • LightGBM • XGBoost • FastAPI • SHAP • Streamlit • Pandas • NumPy • SQLite • Railway
  </text>
</svg>